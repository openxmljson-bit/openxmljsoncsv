name: Windows installer

on:
  push:
    tags: ["v*"]            # build/publish only on version tags (v0.1.0, …)
  workflow_dispatch: {}      # and on-demand from the Actions tab

permissions:
  contents: write            # needed for creating a Release on tags

jobs:
  build:
    runs-on: windows-latest

    # True only when the public-releases-repo token is configured.
    env:
      HAS_RELEASES_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2

      # Derive the app version. On a tag push (refs/tags/v1.2.3) strip the
      # leading "v" and use 1.2.3; otherwise fall back to the spec default.
      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.1.0" >> "$GITHUB_OUTPUT"
          fi

      # Stamp the resolved version into pyproject.toml / Cargo.toml so the built
      # package's metadata (and thus the in-app version) matches the git tag.
      - name: Stamp version
        shell: bash
        env:
          OXJ_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          PY=$(command -v python3 || command -v python)
          "$PY" - <<'PY'
          import os, pathlib, re
          v = os.environ["OXJ_VERSION"]
          for f in ("pyproject.toml", "Cargo.toml"):
              p = pathlib.Path(f)
              p.write_text(re.sub(r'(?m)^version = "[^"]*"',
                                  f'version = "{v}"', p.read_text(), count=1))
          print("Stamped version", v)
          PY

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      # Builds the native module (openxmljson._native.pyd) via maturin's PEP
      # 517 backend (release by default) and installs the package + its
      # dependencies (PySide6-Essentials, …) into this env. Unlike
      # `maturin develop`, `pip install .` needs no activated virtualenv, so
      # it works on the CI runner.
      - name: Build & install native module
        run: pip install .

      # Run from packaging/ so the spec's bare "launcher.py" and icon paths
      # resolve, while writing dist/ and build/ to the repo root (where the
      # Inno Setup script expects dist\OPENXMLJSON\).
      - name: Build app with PyInstaller
        working-directory: packaging
        run: pyinstaller openxmljson.spec --distpath ../dist --workpath ../build --noconfirm

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=${{ steps.ver.outputs.version }}" `
            packaging\windows\openxmljson.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OPENXMLJSON-${{ steps.ver.outputs.version }}-setup
          path: dist/OPENXMLJSON-*-setup.exe
          if-no-files-found: error

      # On tag pushes: publish the installer to the PUBLIC releases repo (source
      # stays private). Needs RELEASES_REPO_TOKEN — a PAT with contents:write on
      # that repo. Skipped automatically if the secret isn't set.
      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/v') && env.HAS_RELEASES_TOKEN == 'true'
        uses: softprops/action-gh-release@v2
        with:
          repository: openxmljson-bit/openxmljsoncsv-releases
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          files: dist/OPENXMLJSON-*-setup.exe
