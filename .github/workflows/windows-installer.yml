name: Windows installer

on:
  push:
    branches: [main]        # build on every push to main
    tags: ["v*"]            # and on version tags (v0.1.0, v1.2.3, …)
  workflow_dispatch: {}      # and on-demand from the Actions tab

permissions:
  contents: write            # needed for creating a Release on tags

jobs:
  build:
    runs-on: windows-latest

    # True only when the code-signing secrets are configured, so the workflow
    # still builds (unsigned) for forks/contributors without the certificate.
    env:
      HAS_CERT: ${{ secrets.WINDOWS_CERT_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2

      # Derive the app version. On a tag push (refs/tags/v1.2.3) strip the
      # leading "v" and use 1.2.3; otherwise fall back to the spec default.
      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.1.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      # Builds the native module (openxmljson._native.pyd) via maturin's PEP
      # 517 backend (release by default) and installs the package + its
      # dependencies (PySide6-Essentials, …) into this env. Unlike
      # `maturin develop`, `pip install .` needs no activated virtualenv, so
      # it works on the CI runner.
      - name: Build & install native module
        run: pip install .

      # Run from packaging/ so the spec's bare "launcher.py" and icon paths
      # resolve, while writing dist/ and build/ to the repo root (where the
      # Inno Setup script expects dist\OPENXMLJSON\).
      - name: Build app with PyInstaller
        working-directory: packaging
        run: pyinstaller openxmljson.spec --distpath ../dist --workpath ../build --noconfirm

      # Decode the base64 .pfx from secrets, import it into the runner's
      # certificate store (so `signtool /a` can find it), and locate signtool
      # from the Windows SDK (it isn't on PATH by default).
      - name: Import code-signing certificate
        if: env.HAS_CERT == 'true'
        shell: pwsh
        run: |
          $bytes = [System.Convert]::FromBase64String("${{ secrets.WINDOWS_CERT_BASE64 }}")
          Set-Content -Path "$env:RUNNER_TEMP\cert.pfx" -Value $bytes -AsByteStream
          $pw = ConvertTo-SecureString -String "${{ secrets.WINDOWS_CERT_PASSWORD }}" -Force -AsPlainText
          Import-PfxCertificate -FilePath "$env:RUNNER_TEMP\cert.pfx" `
            -CertStoreLocation Cert:\CurrentUser\My -Password $pw
          $st = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                Sort-Object FullName | Select-Object -Last 1
          "SIGNTOOL=$($st.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      # Sign the inner application exe before it is packaged, so the app itself
      # (not just the installer) shows a verified publisher when launched.
      - name: Sign application executable
        if: env.HAS_CERT == 'true'
        shell: pwsh
        run: |
          & "$env:SIGNTOOL" sign /fd SHA256 /a /tr http://timestamp.digicert.com /td SHA256 `
            dist\OPENXMLJSON\OPENXMLJSON.exe

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=${{ steps.ver.outputs.version }}" `
            packaging\windows\openxmljson.iss

      # Sign the finished installer — this is the publisher name users see in
      # the UAC / SmartScreen prompt when they run Setup.
      - name: Sign installer
        if: env.HAS_CERT == 'true'
        shell: pwsh
        run: |
          & "$env:SIGNTOOL" sign /fd SHA256 /a /tr http://timestamp.digicert.com /td SHA256 `
            dist\OPENXMLJSON-${{ steps.ver.outputs.version }}-setup.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OPENXMLJSON-${{ steps.ver.outputs.version }}-setup
          path: dist/OPENXMLJSON-*-setup.exe
          if-no-files-found: error

      # Only on tag pushes: attach the installer to a GitHub Release.
      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/OPENXMLJSON-*-setup.exe
